<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NVIDIA GB200 NVL72 — Interactive 3D Explorer</title>
<meta name="description" content="Explore NVIDIA's GB200 NVL72 rack-scale AI system in interactive 3D — from the 120 kW rack down to the Blackwell GPU silicon. Every component is clickable with real specs, plus a guided tour." />
<meta name="theme-color" content="#76b900" />

<!-- Open Graph — og:image/og:url must be absolute; update if the site moves -->
<meta property="og:type" content="website" />
<meta property="og:site_name" content="GB200 NVL72 Explorer" />
<meta property="og:title" content="NVIDIA GB200 NVL72 — Interactive 3D Explorer" />
<meta property="og:description" content="Zoom from the full 120 kW rack down to the Blackwell GPU silicon. 18 compute trays, 9 NVLink switch trays, clickable components with real specs, and a guided tour." />
<meta property="og:url" content="https://nvidia-gpu-viz.pages.dev/" />
<meta property="og:image" content="https://nvidia-gpu-viz.pages.dev/assets/og-image.jpg" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:image:alt" content="3D render of the NVIDIA GB200 NVL72 server rack with glowing NVLink switch trays" />

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="NVIDIA GB200 NVL72 — Interactive 3D Explorer" />
<meta name="twitter:description" content="Zoom from the full 120 kW rack down to the Blackwell GPU silicon. Every component clickable with real specs, plus a guided tour." />
<meta name="twitter:image" content="https://nvidia-gpu-viz.pages.dev/assets/og-image.jpg" />
<meta name="twitter:creator" content="@notpurav" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%2376b900'/%3E%3C/svg%3E" />
<link rel="stylesheet" href="css/style.css" />
<script type="importmap">
{
  "imports": {
    "three": "./vendor/three.module.min.js"
  }
}
</script>
</head>
<body>
<canvas id="scene"></canvas>

<header id="header">
  <div class="brand">
    <h1>GB200 <span>NVL72</span></h1>
  </div>
  <p id="level-subtitle">Rack-scale exaflop AI system — click any component to inspect it</p>
</header>

<nav id="breadcrumb" aria-label="Zoom level"><!-- built dynamically by main.js --></nav>

<aside id="info-panel" class="hidden" aria-live="polite">
  <button id="info-close" aria-label="Close">×</button>
  <div id="info-tag"></div>
  <h2 id="info-name"></h2>
  <p id="info-blurb"></p>
  <table id="info-specs"></table>
  <button id="info-drill" class="hidden"></button>
</aside>

<div id="tooltip" class="hidden"></div>

<button id="tour-btn">▶ Guided Tour</button>

<div id="tour-bar" class="hidden">
  <button id="tour-prev" class="tour-nav">‹ Back</button>
  <div class="tour-body">
    <span id="tour-step"></span>
    <p id="tour-text"></p>
  </div>
  <button id="tour-next" class="tour-nav primary">Next ›</button>
  <button id="tour-exit" aria-label="End tour">×</button>
</div>

<footer id="hint">
  <span><b>Drag</b> rotate</span>
  <span><b>Scroll</b> zoom</span>
  <span><b>Right-drag</b> pan</span>
  <span><b>Click</b> inspect part</span>
  <span><b>Double-click</b> zoom into part</span>
  <span><b>← →</b> switch level</span>
</footer>

<div id="credit">
  Built by <a href="https://twitter.com/notpurav" target="_blank" rel="noopener">@notpurav</a>
  <span class="credit-sep">·</span> <span class="credit-note">Not affiliated with NVIDIA</span>
</div>

<div id="fade"></div>

<script type="module" src="js/main.js"></script>
</body>
</html>
